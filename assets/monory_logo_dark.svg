<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <!-- White arc above the 2nd "O" (for dark footer background) -->
  <path d="M 271 70 A 56 56 0 0 1 381 70"
        stroke="#ffffff"
        stroke-width="13"
        fill="none"
        stroke-linecap="round"/>

  <!-- MONORY bold yellow text -->
  <text
    x="300"
    y="148"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-weight="900"
    font-size="105"
    fill="#F5C800"
    text-anchor="middle"
    letter-spacing="4"
  >MONORY</text>

  <!-- Subtitle: line – text – line (light for dark bg) -->
  <line x1="40"  y1="174" x2="118" y2="174" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <text
    x="300"
    y="180"
    font-family="'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif"
    font-weight="400"
    font-size="16"
    fill="rgba(255,255,255,0.65)"
    text-anchor="middle"
    letter-spacing="0.5"
  >모이고, 놀고, 리프레시하다. 모노리</text>
  <line x1="482" y1="174" x2="560" y2="174" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
</svg>
