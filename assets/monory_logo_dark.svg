<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 195" width="520" height="195">
  <!-- Arc above O - white for dark background -->
  <path d="M 252 75 A 50 50 0 0 1 348 75" stroke="#ffffff" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- MONORY bold yellow text (same color, visible on dark bg too) -->
  <text
    x="260"
    y="142"
    font-family="'Arial Black', 'Impact', 'Arial Bold', Arial, sans-serif"
    font-weight="900"
    font-size="112"
    fill="#F5C800"
    text-anchor="middle"
    letter-spacing="3"
  >MONORY</text>

  <!-- Subtitle row: line - text - line (light color for dark bg) -->
  <line x1="28"  y1="170" x2="108" y2="170" stroke="rgba(255,255,255,0.5)" stroke-width="1.8"/>
  <text
    x="260"
    y="176"
    font-family="'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif"
    font-weight="400"
    font-size="17"
    fill="rgba(255,255,255,0.7)"
    text-anchor="middle"
    letter-spacing="0.5"
  >모이고, 놀고, 리프레시하다. 모노리</text>
  <line x1="412" y1="170" x2="492" y2="170" stroke="rgba(255,255,255,0.5)" stroke-width="1.8"/>
</svg>
