<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모노리 커뮤니티</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script defer src="/__/firebase/10.8.0/firebase-app-compat.js"></script>
    <script defer src="/__/firebase/10.8.0/firebase-auth-compat.js"></script>
    <script defer src="/__/firebase/10.8.0/firebase-firestore-compat.js"></script>
    <script defer src="/__/firebase/init.js?useEmulator=false"></script>

    <link rel="stylesheet" href="style.css">
    
    <style>
        :root {
            --bg-main: #111111;
            --bg-secondary: #1a1a1a;
            --text-primary: #f5f5f5;
            --text-secondary: #aaaaaa;
            --accent-gold: #D4AF37;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        
        body { background-color: var(--bg-main); color: var(--text-primary); }

        .comm-container {
            max-width: 900px;
            margin: 60px auto;
            padding: 20px;
        }

        .comm-header {
            text-align: center;
            margin-bottom: 40px;
        }

        /* Tabs */
        .member-tabs {
            display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;
        }
        .tab-btn {
            background: none; border: none; color: var(--text-secondary); font-size: 1.05rem; padding: 10px 20px; cursor: pointer; transition: 0.3s; font-weight: 500; position: relative;
        }
        .tab-btn.active {
            color: var(--accent-gold); font-weight: 700;
        }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: -11px; left: 0; width: 100%; height: 2px; background: var(--accent-gold);
        }

        /* Posts */
        .post-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .post-card:hover { border-color: rgba(212,175,55,0.5); }
        .post-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }
        .post-title { font-size: 1.15rem; font-weight: 600; color: #fff; }
        .post-meta { font-size: 0.85rem; color: #888; display: flex; align-items: center; gap: 10px; }
        .post-content { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border-color); line-height: 1.6; color: #ccc; white-space: pre-wrap; }
        .post-card.open .post-content { display: block; }
        
        .badge-notice { background: rgba(212,175,55,0.15); color: var(--accent-gold); padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; border: 1px solid rgba(212,175,55,0.3); }

        .btn-write {
            background: var(--accent-gold);
            color: #111; border: none;
            padding: 12px 24px; font-size: 1rem; font-weight: 600; border-radius: 8px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-write:hover { background: #f3e5ab; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--bg-secondary); padding: 30px; border-radius: 12px; width: 90%; max-width: 600px; border: 1px solid var(--border-color); position: relative; }
        .modal-close { position: absolute; right: 20px; top: 20px; background: none; border: none; color: #aaa; font-size: 1.5rem; cursor: pointer; }
        .comm-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        .comm-input:focus { outline: none; border-color: var(--accent-gold); }

        /* Action Buttons */
        .post-actions {
            display: flex; gap: 15px; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;
        }
        .action-btn {
            background: none; border: none; font-size: 0.82rem; cursor: pointer; color: #777; transition: 0.2s; display: flex; align-items: center; gap: 5px;
        }
        .action-btn:hover { color: var(--accent-gold); }
        .action-btn.delete:hover { color: #ff5252; }
    </style>
</head>
<body>
    <div class="comm-container">
        <div class="comm-header">
            <h1 style="color: var(--accent-gold); margin-bottom: 10px;">모노리 커뮤니티</h1>
            <p style="color: var(--text-secondary);">모노리에서의 경험을 자유롭게 공유해 보세요.</p>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div class="member-tabs">
                <button class="tab-btn active" onclick="switchTab('notices')" id="tab-notices">공지사항</button>
                <button class="tab-btn" onclick="switchTab('inquiries')" id="tab-inquiries">문의사항</button>
            </div>
            
            <button class="btn-write" id="btn-open-write" onclick="openWriteModal()" style="display:none;"><i class="fa-solid fa-pen"></i> 글쓰기</button>
        </div>

        <div id="posts-container" style="min-height: 300px;">
            <div style="text-align: center; padding: 50px; color:#888;">게시글을 불러오는 중입니다...</div>
        </div>

        <div style="text-align: center; margin-top: 60px;">
            <button onclick="window.location.href='index.html'" style="background: none; color: #aaa; border: 1px solid #555; padding: 10px 24px; font-size: 0.9rem; border-radius: 8px; cursor: pointer;">메인으로 가기</button>
        </div>
        
        <!-- Version Display -->
        <div style="text-align: center; margin-top: 40px; font-size: 0.8rem; color: #555;">
            v1.3.72 (2026-04-13)
        </div>
    </div>

    <!-- Write Modal -->
    <div id="writeModal" class="modal-overlay" onclick="if(event.target===this) closeWriteModal()">
        <div class="modal-content">
            <button class="modal-close" onclick="closeWriteModal()">&times;</button>
            <h2 id="modal-title" style="color:var(--accent-gold); margin-bottom: 20px;">게시글 작성</h2>
            
            <input type="text" id="write-title" class="comm-input" placeholder="제목을 입력하세요">
            <textarea id="write-content" class="comm-input" style="height: 200px; resize:none;" placeholder="내용을 작성해 주세요."></textarea>
            
            <div id="qnaPasswordSection" style="display:none; margin-bottom:15px;">
                <label style="display:block; color:#aaa; font-size:0.9rem; margin-bottom:8px;">비밀번호 (4자리 숫자)</label>
                <input type="password" id="write-password" class="comm-input" maxlength="4" placeholder="비밀번호 4자리" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>
            
            <button id="btn-submit-post" class="btn-write" style="width:100%; justify-content:center; margin-top:10px;" onclick="submitPost()">등록하기</button>
        </div>
    </div>

    <!-- Password Verification Modal -->
    <div id="passwordModal" class="modal-overlay" onclick="if(event.target===this) closePasswordModal()">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <button class="modal-close" onclick="closePasswordModal()">&times;</button>
            <h2 style="color:var(--accent-gold); margin-bottom: 15px;"><i class="fa-solid fa-lock"></i> 비밀글 조회</h2>
            <p style="color:var(--text-secondary); margin-bottom: 20px; font-size:0.9rem;">작성 시 설정한 비밀번호 4자리를 입력해 주세요.</p>
            
            <input type="password" id="check-password" class="comm-input" maxlength="4" placeholder="비밀번호 4자리" style="text-align:center; font-size:1.5rem; letter-spacing: 10px;" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            
            <button id="btn-verify-password" class="btn-write" style="width:100%; justify-content:center; margin-top:10px;" onclick="verifyPostPassword()">확인</button>
        </div>
    </div>

    <script>
        let currentTab = 'notices'; // notices | inquiries
        let currentUser = null;
        let currentUserRole = 'user'; 
        let postsListener = null;
        let targetPostId = null;
        let pendingAction = 'view'; // view | edit | delete
        let isEditMode = false;

        document.addEventListener("DOMContentLoaded", () => {
            const userStr = localStorage.getItem('monory_user');
            if (userStr) {
                currentUser = JSON.parse(userStr);
                checkUserRole().then(() => {
                    updateWriteButtonVisibility();
                });
            } else {
                updateWriteButtonVisibility();
            }

            const checkFirebase = setInterval(() => {
                if (typeof firebase !== 'undefined' && firebase.firestore) {
                    clearInterval(checkFirebase);
                    loadPosts(currentTab);
                }
            }, 100);
        });

        async function checkUserRole() {
            if(!currentUser) return;
            const db = firebase.firestore();
            try {
                // Kakao ID를 문서 ID로 사용하거나 uid를 사용함 (이전 코드에서는 String(currentUser.kakaoId))
                const doc = await db.collection('members').doc(String(currentUser.kakaoId)).get();
                if(doc.exists) {
                    currentUserRole = doc.data().role || 'user';
                }
            }catch(e) {
                console.error("Role check failed:", e);
            }
        }

        function updateWriteButtonVisibility() {
            const btn = document.getElementById('btn-open-write');
            if (!currentUser) {
                btn.style.display = 'none';
                return;
            }

            if (currentTab === 'notices') {
                // 공지사항 탭: 어드민만 노출
                if (currentUserRole === 'super_admin' || currentUserRole === 'admin' || currentUserRole === 'general_admin') {
                    btn.style.display = 'flex';
                } else {
                    btn.style.display = 'none';
                }
            } else {
                // 문의사항 탭: 로그인한 유저 누구나 노출
                btn.style.display = 'flex';
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            updateWriteButtonVisibility();
            loadPosts(tab);
        }

        function loadPosts(collectionName) {
            const container = document.getElementById('posts-container');
            const db = firebase.firestore();
            
            if (postsListener) postsListener(); // 이전 구독 취소

            container.innerHTML = `<div style="text-align: center; padding: 50px; color:#888;"><i class="fa-solid fa-spinner fa-spin"></i> 불러오는 중...</div>`;

            postsListener = db.collection(collectionName)
                .orderBy('createdAt', 'desc')
                .onSnapshot((snapshot) => {
                    if (snapshot.empty) {
                        container.innerHTML = `<div style="text-align: center; padding: 50px; background: rgba(255,255,255,0.02); border-radius:12px; color:#aaa;">작성된 글이 없습니다.</div>`;
                        return;
                    }

                    container.innerHTML = '';
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        const dateStr = data.createdAt ? data.createdAt.toDate().toLocaleDateString() : '';
                        const isNotice = collectionName === 'notices';
                        const badge = isNotice ? `<span class="badge-notice">공지</span> ` : '';
                        const lockIcon = collectionName === 'inquiries' ? `<i class="fa-solid fa-lock" style="font-size:0.8rem; margin-right:6px; color:var(--accent-gold);"></i> ` : '';
                        const authorDisplay = collectionName === 'inquiries' ? '익명' : data.authorName;
                        
                        const div = document.createElement('div');
                        div.className = 'post-card';
                        div.id = 'post-' + doc.id;

                        let actionButtons = '';
                        if (collectionName === 'inquiries') {
                            actionButtons = `
                                <div class="post-actions">
                                    <button class="action-btn" onclick="requestInquiryAction('${doc.id}', 'edit')"><i class="fa-solid fa-pen-to-square"></i> 수정</button>
                                    <button class="action-btn delete" onclick="requestInquiryAction('${doc.id}', 'delete')"><i class="fa-solid fa-trash-can"></i> 삭제</button>
                                </div>
                            `;
                        }

                        div.innerHTML = `
                            <div class="post-header" onclick="handlePostClick('${doc.id}', '${collectionName}')">
                                <div class="post-title">${badge}${lockIcon}${data.title}</div>
                                <div class="post-meta">
                                    <span><i class="fa-solid fa-user" style="font-size:0.8rem; margin-right:4px;"></i>${authorDisplay}</span>
                                    <span>${dateStr}</span>
                                    <i class="fa-solid fa-chevron-down" style="font-size:0.8rem; margin-left:10px;"></i>
                                </div>
                            </div>
                            <div class="post-content" id="content-${doc.id}"></div>
                        `;
                        container.appendChild(div);

                        // Content section inside div need buttons if it's inquiry
                        const contentDiv = div.querySelector('.post-content');
                        div.addEventListener('contentLoaded', (e) => {
                            if(actionButtons) contentDiv.innerHTML += actionButtons;
                        });
                    });
                }, (error) => {
                    console.error("게시글 불러오기 실패:", error);
                    if (error.code === 'permission-denied') {
                        container.innerHTML = `<div style="text-align: center; padding: 50px; color:#F44336;">접근 권한이 없습니다. 관리자에게 문의하세요.</div>`;
                    } else {
                        container.innerHTML = `<div style="text-align: center; padding: 50px; color:#F44336;">데이터를 불러올 수 없습니다.</div>`;
                    }
                });
        }

        function handlePostClick(postId, collectionName) {
            const isAdmin = (currentUserRole === 'super_admin' || currentUserRole === 'admin' || currentUserRole === 'general_admin');
            
            if (collectionName === 'notices' || isAdmin) {
                togglePostContent(postId, collectionName);
            } else {
                // 문의사항이면서 관리자가 아닌 경우 비밀번호 확인
                targetPostId = postId;
                pendingAction = 'view';
                openPasswordModal();
            }
        }

        function requestInquiryAction(postId, action) {
            event.stopPropagation();
            targetPostId = postId;
            pendingAction = action;
            openPasswordModal();
        }

        async function togglePostContent(postId, collectionName) {
            const postCard = document.getElementById('post-' + postId);
            const contentDiv = document.getElementById('content-' + postId);
            
            if (postCard.classList.contains('open')) {
                postCard.classList.remove('open');
                return;
            }

            // 이미 로드된 경우 토글만
            if (contentDiv.innerHTML !== '') {
                postCard.classList.add('open');
                return;
            }

            // 데이터 로드
            try {
                const db = firebase.firestore();
                const doc = await db.collection(collectionName).doc(postId).get();
                if (doc.exists) {
                    contentDiv.innerHTML = doc.data().content;
                    postCard.classList.add('open');
                    // 트리거 버튼 추가 제어
                    postCard.dispatchEvent(new CustomEvent('contentLoaded'));
                }
            } catch (e) {
                console.error('글 내용 불러오기 실패:', e);
            }
        }

        function openPasswordModal() {
            document.getElementById('passwordModal').classList.add('active');
            document.getElementById('check-password').value = '';
            document.getElementById('check-password').focus();
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').classList.remove('active');
            targetPostId = null;
        }

        async function verifyPostPassword() {
            if (!targetPostId) return;
            const inputPass = document.getElementById('check-password').value;
            if (inputPass.length !== 4) {
                alert('비밀번호 4자리를 입력해주세요.');
                return;
            }

            const btn = document.getElementById('btn-verify-password');
            btn.disabled = true;
            btn.innerHTML = '확인 중...';

            try {
                const doc = await db.collection('inquiries').doc(targetPostId).get();
                if (doc.exists) {
                    const data = doc.data();
                    if (data.password === inputPass) {
                        closePasswordModal();
                        if (pendingAction === 'view') {
                            togglePostContent(targetPostId, 'inquiries');
                        } else if (pendingAction === 'edit') {
                            openEditModal(targetPostId, data);
                        } else if (pendingAction === 'delete') {
                            if(confirm('정말로 이 글을 삭제하시겠습니까?')) {
                                deletePost(targetPostId);
                            }
                        }
                    } else {
                        alert('비밀번호가 일치하지 않습니다.');
                    }
                }
            } catch (e) {
                console.error('비밀번호 확인 실패:', e);
                alert('연결 오류가 발생했습니다.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '확인';
            }
        }

        function openWriteModal() {
            if(!currentUser) {
                alert('로그인 후 이용할 수 있습니다.');
                return;
            }
            isEditMode = false;
            document.getElementById('writeModal').classList.add('active');
            document.getElementById('write-title').value = '';
            document.getElementById('write-content').value = '';
            document.getElementById('write-password').value = '';
            
            if (currentTab === 'notices') {
                document.getElementById('modal-title').textContent = '공지사항 작성';
                document.getElementById('qnaPasswordSection').style.display = 'none';
            } else {
                document.getElementById('modal-title').textContent = '문의사항 작성';
                document.getElementById('qnaPasswordSection').style.display = 'block';
            }
            document.getElementById('btn-submit-post').textContent = '등록하기';
        }

        function openEditModal(postId, data) {
            isEditMode = true;
            targetPostId = postId;
            document.getElementById('writeModal').classList.add('active');
            document.getElementById('write-title').value = data.title;
            document.getElementById('write-content').value = data.content;
            document.getElementById('write-password').value = data.password;
            
            document.getElementById('modal-title').textContent = '문의사항 수정';
            document.getElementById('qnaPasswordSection').style.display = 'block';
            document.getElementById('btn-submit-post').textContent = '수정 완료';
        }

        function closeWriteModal() {
            document.getElementById('writeModal').classList.remove('active');
        }

        async function submitPost() {
            const title = document.getElementById('write-title').value.trim();
            const content = document.getElementById('write-content').value.trim();
            const password = document.getElementById('write-password').value.trim();

            if (currentTab === 'notices') {
                if (currentUserRole !== 'super_admin' && currentUserRole !== 'admin' && currentUserRole !== 'general_admin') {
                    alert('공지사항 작성 권한이 없습니다.');
                    return;
                }
            } else if (currentTab === 'inquiries') {
                if (password.length !== 4) {
                    alert('비밀번호 4자리를 설정해주세요.');
                    return;
                }
            }

            if(!title) { alert('제목을 입력해주세요.'); return; }
            if(!content) { alert('내용을 입력해주세요.'); return; }

            const btn = document.getElementById('btn-submit-post');
            btn.disabled = true;
            btn.innerHTML = '등록 중...';

            try {
                const db = firebase.firestore();
                const postData = {
                    title: title,
                    content: content,
                    authorId: currentUser.kakaoId,
                    authorName: currentUser.name,
                    createdAt: firebase.firestore.Timestamp.now()
                };

                if (currentTab === 'inquiries') {
                    postData.password = password;
                }

                if (isEditMode && targetPostId) {
                    await db.collection(currentTab).doc(targetPostId).update({
                        title: title,
                        content: content,
                        password: password,
                        updatedAt: firebase.firestore.Timestamp.now()
                    });
                    alert('게시글이 수정되었습니다.');
                } else {
                    await db.collection(currentTab).add(postData);
                    alert('게시글이 등록되었습니다.');
                }
                
                closeWriteModal();
                loadPosts(currentTab);
            } catch(e) {
                console.error('글 작성/수정 실패:', e);
                alert('처리에 실패했습니다: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = isEditMode ? '수정 완료' : '등록하기';
            }
        }

        async function deletePost(postId) {
            try {
                const db = firebase.firestore();
                await db.collection('inquiries').doc(postId).delete();
                alert('게시글이 삭제되었습니다.');
                loadPosts('inquiries');
            } catch (e) {
                console.error('삭제 실패:', e);
                alert('삭제에 실패했습니다.');
            }
        }
    </script>
</body>
</html>
