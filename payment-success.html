<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>예약 완료 | Monory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=1.3.0">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .success-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .check-icon {
            width: 80px;
            height: 80px;
            background: var(--accent-gold);
            color: var(--bg-main);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 30px;
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .success-title {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            color: var(--accent-gold);
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .success-msg {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .summary-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 40px;
            text-align: left;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .summary-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .summary-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .summary-value {
            font-weight: 500;
            color: var(--text-primary);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-success {
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent-gold);
            color: var(--bg-main);
            border: none;
        }

        .btn-primary:hover {
            background: var(--accent-gold-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px var(--accent-glow);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .redirect-timer {
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        #timer-count {
            color: var(--accent-gold);
            font-weight: bold;
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
            color: transparent !important;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

    <div class="success-container">
        <div class="check-icon">
            <i class="fa-solid fa-check"></i>
        </div>
        <h1 class="success-title">예약이 완료되었습니다!</h1>
        <p class="success-msg">모노리를 선택해 주셔서 감사합니다.<br>공간 이용에 필요한 정보를 확인해 주세요.</p>

        <div class="summary-box" id="reservation-summary">
            <div class="summary-item">
                <span class="summary-label">예약 날짜</span>
                <span class="summary-value skeleton" id="res-date">2026년 00월 00일</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">이용 패키지</span>
                <span class="summary-value skeleton" id="res-package">로딩 중...</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">방문 인원</span>
                <span class="summary-value skeleton" id="res-guests">0명</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">결제 금액</span>
                <span class="summary-value skeleton" id="res-amount">0원</span>
            </div>
        </div>

        <div class="btn-group">
            <a href="mypage.html" class="btn-success btn-primary">
                예약 내역 확인하기 <i class="fa-solid fa-calendar-check"></i>
            </a>
            <a href="index.html" class="btn-success btn-outline">홈으로 가기</a>
        </div>

        <p class="redirect-timer">
            <span id="timer-count">5</span>초 후 마이페이지로 자동 이동합니다.
        </p>
    </div>

    <!-- Firebase SDK (Compat) -->
    <script src="/__/firebase/10.8.0/firebase-app-compat.js"></script>
    <script src="/__/firebase/10.8.0/firebase-firestore-compat.js"></script>
    <script src="/__/firebase/init.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Confetti Effect
            const duration = 3 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);

            // Fetch Reservation Data
            const urlParams = new URLSearchParams(window.location.search);
            const impUid = urlParams.get('imp_uid');
            const merchantUid = urlParams.get('merchant_uid');

            const checkFirebase = setInterval(() => {
                if (typeof firebase !== 'undefined' && firebase.firestore) {
                    clearInterval(checkFirebase);
                    loadReservationDetail();
                }
            }, 100);

            async function loadReservationDetail() {
                try {
                    const db = firebase.firestore();
                    let query;
                    
                    if (impUid) {
                        query = db.collection('reservations').where('impUid', '==', impUid);
                    } else if (merchantUid) {
                        query = db.collection('reservations').where('merchantUid', '==', merchantUid);
                    } else {
                        // 파라미터가 없으면 가장 최근 예약을 가져오거나 로컬스토리지 활용...
                        // 여기서는 데이터 로딩 실패 처리
                        showEmptyState();
                        startRedirectTimer();
                        return;
                    }

                    const snapshot = await query.get();
                    if (!snapshot.empty) {
                        const data = snapshot.docs[0].data();
                        renderSummary(data);
                    } else {
                        // 아직 DB에 저장 전일 수 있음 (콜백과 리다이렉트 시간차)
                        // 1초 뒤 재시도
                        setTimeout(loadReservationDetail, 1000);
                    }
                } catch (e) {
                    console.error("데이터 로드 실패:", e);
                    showEmptyState();
                }
            }

            function renderSummary(data) {
                const dateEl = document.getElementById('res-date');
                const pkgEl = document.getElementById('res-package');
                const guestEl = document.getElementById('res-guests');
                const amountEl = document.getElementById('res-amount');

                [dateEl, pkgEl, guestEl, amountEl].forEach(el => el.classList.remove('skeleton'));

                dateEl.textContent = data.date || '-';
                pkgEl.textContent = data.packageName || '-';
                guestEl.textContent = (data.guestCount || 0) + '명';
                amountEl.textContent = (data.totalAmount || 0).toLocaleString() + '원';

                startRedirectTimer();
            }

            function showEmptyState() {
                const summary = document.getElementById('reservation-summary');
                summary.innerHTML = '<p style="text-align:center; color:#888; padding:20px;">예약 상세 정보를 불러올 수 없습니다.<br>마이페이지에서 확인해 주세요.</p>';
            }

            // Redirect Timer
            let timeLeft = 5;
            function startRedirectTimer() {
                const timerEl = document.getElementById('timer-count');
                const timerId = setInterval(() => {
                    timeLeft -= 1;
                    timerEl.textContent = timeLeft;
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        window.location.href = 'mypage.html';
                    }
                }, 1000);
            }
        });
    </script>
</body>
</html>
