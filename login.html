<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monory Admin - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, rgba(30, 30, 40, 1) 0%, var(--bg-main) 100%);
        }
        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-logo {
            font-size: 2rem;
            font-family: var(--font-heading);
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .login-logo span {
            color: var(--accent-gold);
            font-weight: 300;
        }
        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .form-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px 16px;
            color: var(--text-primary);
            font-family: var(--font-body);
            transition: 0.3s;
        }
        .form-input:focus {
            border-color: var(--accent-gold);
            outline: none;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }
        .login-btn {
            background: var(--accent-gold);
            color: var(--bg-main);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .login-btn:hover {
            background: var(--accent-gold-hover);
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .error-message {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-logo">MONORY<span>ADMIN</span></div>
        <div class="login-subtitle">관리자 페이지 보안 접속</div>
        
        <form id="login-form" autocomplete="off">
            <!-- 브라우저 경고 팝업(비밀번호 유출/도용) 우회용 가짜 필드 -->
            <input style="display:none" type="text" name="fakeusernameremembered"/>
            <input style="display:none" type="password" name="fakepasswordremembered"/>

            <div class="form-group">
                <label class="form-label" for="email">이메일 주소</label>
                <input type="email" id="email" class="form-input" placeholder="admin@monory.com" required autocomplete="off" spellcheck="false">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">비밀번호</label>
                <!-- 비밀번호 유출 경고 방지를 위해 autocomplete 설정을 new-password로 강제 변경 -->
                <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="new-password" spellcheck="false">
            </div>
            
            <div class="form-group" style="margin-bottom: 24px; display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="remember-email" style="cursor: pointer; width: 16px; height: 16px; accent-color: var(--accent-gold);">
                <label for="remember-email" style="font-size: 0.85rem; color: var(--text-secondary); cursor: pointer;">이메일 기억하기</label>
            </div>
            
            <div id="error-msg" class="error-message">이메일 또는 비밀번호가 올바르지 않습니다.</div>
            
            <button type="submit" class="login-btn" id="submit-btn"><i class="fa-solid fa-right-to-bracket"></i> 이메일 로그인</button>
        </form>

        <div style="margin: 25px 0; border-top: 1px solid var(--border-color); position: relative;">
            <span style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--bg-secondary); padding: 0 10px; color: var(--text-secondary); font-size: 0.8rem;">또는</span>
        </div>

        <button type="button" class="login-btn" id="btn-kakao-admin" style="background: #FEE500; color: #3C1E1E;">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="vertical-align: text-top; margin-right: 6px;">
                <path d="M9 1C4.582 1 1 3.896 1 7.47c0 2.28 1.513 4.278 3.808 5.424l-.97 3.605 4.2-2.774c.637.09 1.29.135 1.962.135 4.418 0 8-2.896 8-6.47C18 3.896 13.418 1 9 1z" fill="#3C1E1E"/>
            </svg>
            카카오 계정으로 관리자 로그인
        </button>
    </div>

    <!-- Firebase Auth & Firestore 설정 -->
    <script defer src="/__/firebase/10.8.0/firebase-app-compat.js"></script>
    <script defer src="/__/firebase/10.8.0/firebase-auth-compat.js"></script>
    <script defer src="/__/firebase/10.8.0/firebase-firestore-compat.js"></script>
    <script defer src="/__/firebase/init.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const auth = firebase.auth();
                
                // 이미 이메일 관리자 인증이 되어 있거나 카카오 관리자 세션이 있다면 대시보드로 이동
                auth.onAuthStateChanged((user) => {
                    const hasAuth = !!user;
                    const hasKakaoAdmin = !!sessionStorage.getItem('monory_admin_session');
                    if (hasAuth || hasKakaoAdmin) {
                        window.location.href = 'admin.html';
                    }
                });

                // 이메일 저장 기능 (localStorage)
                const savedEmail = localStorage.getItem('monory_admin_email');
                if (savedEmail) {
                    document.getElementById('email').value = savedEmail;
                    document.getElementById('remember-email').checked = true;
                }

                document.getElementById('login-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    const rememberEmail = document.getElementById('remember-email').checked;

                    // 이메일 기억 체크 여부에 따라 저장/삭제
                    if (rememberEmail) {
                        localStorage.setItem('monory_admin_email', email);
                    } else {
                        localStorage.removeItem('monory_admin_email');
                    }
                    const btn = document.getElementById('submit-btn');
                    const errorMsg = document.getElementById('error-msg');
                    
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 확인 중...';
                    errorMsg.style.display = 'none';

                    auth.signInWithEmailAndPassword(email, password)
                        .then((userCredential) => {
                            // 로그인 성공 시 onAuthStateChanged에 의해 리다이렉트됨
                        })
                        .catch((error) => {
                            btn.disabled = false;
                            btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> 로그인';
                            errorMsg.style.display = 'block';
                            
                            if(error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                                errorMsg.innerText = '이메일 또는 비밀번호가 올바르지 않습니다.';
                            } else {
                                errorMsg.innerText = '인증 에러가 발생했습니다: ' + error.message;
                            }
                        });
                });

                // --- 카카오 관리자 로그인 연동 ---
                const KAKAO_APP_KEY = 'c697d9b2e64f7b8ba66bf65ef93ab9a2';
                const KAKAO_REDIRECT = window.location.origin;

                document.getElementById('btn-kakao-admin').addEventListener('click', () => {
                    const btn = document.getElementById('btn-kakao-admin');
                    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 확인 중...';
                    
                    const authUrl = `https://kauth.kakao.com/oauth/authorize?client_id=${KAKAO_APP_KEY}&redirect_uri=${encodeURIComponent(KAKAO_REDIRECT)}&response_type=code&scope=profile_nickname,profile_image&prompt=select_account`;
                    const popup = window.open(authUrl, 'kakaoAdminLogin', 'width=450,height=600,scrollbars=yes');
                    
                    if (!popup || popup.closed || typeof popup.closed === 'undefined') {
                        alert('팝업 차단이 감지되었습니다. 브라우저 설정에서 팝업을 허용해주세요.');
                        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="vertical-align: text-top; margin-right: 6px;"><path d="M9 1C4.582 1 1 3.896 1 7.47c0 2.28 1.513 4.278 3.808 5.424l-.97 3.605 4.2-2.774c.637.09 1.29.135 1.962.135 4.418 0 8-2.896 8-6.47C18 3.896 13.418 1 9 1z" fill="#3C1E1E"/></svg> 카카오 계정으로 관리자 로그인';
                    }
                });

                // 인증 팝업 (index.html)에서 넘어온 user 정보 수신
                window.addEventListener('message', async (event) => {
                    const btn = document.getElementById('btn-kakao-admin');

                    if (event.data && event.data.type === 'KAKAO_LOGIN_SUCCESS') {
                        const user = event.data.user;
                        const db = firebase.firestore();
                        
                        try {
                            const doc = await db.collection('members').doc(String(user.kakaoId)).get();
                            if (doc.exists) {
                                const role = doc.data().role;
                                if (role === 'super_admin' || role === 'general_admin') {
                                    // 관리자 권한 확인됨
                                    sessionStorage.setItem('monory_admin_session', JSON.stringify({
                                        kakaoId: user.kakaoId,
                                        role: role,
                                        name: user.name
                                    }));
                                    window.location.href = 'admin.html';
                                } else {
                                    // 일반 회원인 경우 튕겨냄
                                    alert('관리자 권한이 없습니다.');
                                    window.location.href = 'index.html';
                                }
                            } else {
                                alert('가입된 회원 정보를 찾을 수 없습니다.');
                                btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="vertical-align: text-top; margin-right: 6px;"><path d="M9 1C4.582 1 1 3.896 1 7.47c0 2.28 1.513 4.278 3.808 5.424l-.97 3.605 4.2-2.774c.637.09 1.29.135 1.962.135 4.418 0 8-2.896 8-6.47C18 3.896 13.418 1 9 1z" fill="#3C1E1E"/></svg> 카카오 계정으로 관리자 로그인';
                            }
                        } catch (e) {
                            console.error(e);
                            alert('권한을 확인하는 중 서버 오류가 발생했습니다.');
                            btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="vertical-align: text-top; margin-right: 6px;"><path d="M9 1C4.582 1 1 3.896 1 7.47c0 2.28 1.513 4.278 3.808 5.424l-.97 3.605 4.2-2.774c.637.09 1.29.135 1.962.135 4.418 0 8-2.896 8-6.47C18 3.896 13.418 1 9 1z" fill="#3C1E1E"/></svg> 카카오 계정으로 관리자 로그인';
                        }
                    }
                    
                    if (event.data && event.data.type === 'KAKAO_LOGIN_FAIL') {
                        alert('카카오 인증에 실패했습니다.');
                        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="vertical-align: text-top; margin-right: 6px;"><path d="M9 1C4.582 1 1 3.896 1 7.47c0 2.28 1.513 4.278 3.808 5.424l-.97 3.605 4.2-2.774c.637.09 1.29.135 1.962.135 4.418 0 8-2.896 8-6.47C18 3.896 13.418 1 9 1z" fill="#3C1E1E"/></svg> 카카오 계정으로 관리자 로그인';
                    }
                });

            }, 500); // init.js 로딩 대기
        });
    </script>
</body>
</html>
